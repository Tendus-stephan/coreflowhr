name: Deploy to Production

# Fires only on pushes to the `prod` branch.
# The prod branch is updated exclusively via scripts/promote-to-prod.sh,
# which requires manual confirmation after staging is verified.
#
# Gate: unit tests must pass → then deploy to coreflowhr-prod Vercel project.

on:
  push:
    branches: [prod]

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ── 2. Deploy to production ────────────────────────────────────
  deploy:
    name: Deploy → coreflowhr.com
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.coreflowhr.com

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull env vars that are set in the production Vercel project dashboard
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
