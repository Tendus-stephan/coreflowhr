name: Deploy to Staging

# Fires on every push to main.
# Unit tests must pass before the deployment job runs.
# The deployment targets the coreflowhr-staging Vercel project
# whose production domain is staging.coreflowhr.com.

on:
  push:
    branches: [main]

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ── 2. Deploy to staging ───────────────────────────────────────
  deploy:
    name: Deploy → staging.coreflowhr.com
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.coreflowhr.com

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Apply pending migrations before the frontend goes live
      - name: Push DB migrations → staging
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          supabase db push --linked --include-all --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Keep edge functions in sync with the codebase
      - name: Deploy edge functions → staging
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull project settings (.vercel/project.json) — required by vercel build.
      # This also writes .vercel/.env.production.local but Vite doesn't read that path.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Write staging env vars into .env.production.local so Vite embeds
      # them during vercel build (vercel pull writes to .vercel/ which Vite never reads).
      - name: Write staging env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.STAGING_VITE_SUPABASE_URL }}" >> .env.production.local
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.STAGING_VITE_SUPABASE_ANON_KEY }}" >> .env.production.local
          echo "VITE_FRONTEND_URL=https://staging.coreflowhr.com" >> .env.production.local
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STAGING_VITE_STRIPE_PUBLISHABLE_KEY }}" >> .env.production.local
          echo "VITE_STRIPE_PRICE_ID_PROFESSIONAL_MONTHLY=${{ secrets.STAGING_VITE_STRIPE_PRICE_ID_PROFESSIONAL_MONTHLY }}" >> .env.production.local
          echo "VITE_STRIPE_PRICE_ID_FOUNDING_MONTHLY=${{ secrets.STAGING_VITE_STRIPE_PRICE_ID_FOUNDING_MONTHLY }}" >> .env.production.local
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" >> .env.production.local
          echo "VITE_CALENDLY_URL=${{ secrets.VITE_CALENDLY_URL }}" >> .env.production.local

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
