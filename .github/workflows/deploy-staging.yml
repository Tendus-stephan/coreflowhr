name: Deploy to Staging

# Fires on every push to main.
# Unit tests must pass before the deployment job runs.
# The deployment targets the coreflowhr-staging Vercel project
# whose production domain is staging.coreflowhr.com.

on:
  push:
    branches: [main]

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ── 2. Deploy to staging ───────────────────────────────────────
  deploy:
    name: Deploy → staging.coreflowhr.com
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.coreflowhr.com

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Apply pending migrations before the frontend goes live
      - name: Push DB migrations → staging
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          supabase db push --linked --include-all --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Keep edge functions in sync with the codebase
      - name: Deploy edge functions → staging
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Build with env vars injected directly — vercel pull does not expose
      # vars to vite build (writes to .vercel/.env.* which Vite never reads).
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_VITE_SUPABASE_ANON_KEY }}
          VITE_FRONTEND_URL: https://staging.coreflowhr.com
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_PRICE_ID_PROFESSIONAL_MONTHLY: ${{ secrets.STAGING_VITE_STRIPE_PRICE_ID_PROFESSIONAL_MONTHLY }}
          VITE_STRIPE_PRICE_ID_FOUNDING_MONTHLY: ${{ secrets.STAGING_VITE_STRIPE_PRICE_ID_FOUNDING_MONTHLY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_CALENDLY_URL: ${{ secrets.VITE_CALENDLY_URL }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
