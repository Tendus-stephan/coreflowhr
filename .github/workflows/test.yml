name: Test Suite

# Runs on every push to every branch.
# Blocks deployment to staging if any job fails.
# Production deployments remain manual-trigger only.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run existing integration tests
        run: npm run test:run

      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

  # ── 2. E2E tests (only if unit tests pass) ────────────────────────────────
  e2e-tests:
    name: E2E tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_RECRUITER_EMAIL: ${{ secrets.TEST_RECRUITER_EMAIL }}
      TEST_RECRUITER_PASSWORD: ${{ secrets.TEST_RECRUITER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build app
        run: npm run build

      - name: Start app (preview mode)
        run: npm run preview &
        env:
          PORT: 5173

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium --project=firefox
        continue-on-error: false

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: |
            test-results/e2e-artifacts/
            test-results/playwright-report/
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: test-results/playwright-report/
          retention-days: 14

  # ── 3. Visual regression (only if E2E passes) ─────────────────────────────
  visual-tests:
    name: Visual regression
    needs: e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run visual tests on main branch pushes to keep PR CI fast
    if: github.ref == 'refs/heads/main'
    env:
      CI_VISUAL: '1'
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run preview &

      - name: Wait for app
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_id }}
          path: test-results/
          retention-days: 14

  # ── 4. Staging smoke test (only on main, after all tests pass) ────────────
  staging-smoke:
    name: Staging smoke test
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Wait for staging deployment
        # Give Vercel ~90s to finish the deployment triggered by deploy-staging.yml
        run: sleep 90

      - name: Run staging smoke test
        run: |
          npx playwright test tests/e2e/auth.spec.ts \
            --project=chromium \
            --grep "Log in with correct credentials" \
            --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: https://staging.coreflowhr.com
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.coreflowhr.com)
          if [ "$STATUS" != "200" ]; then
            echo "Staging health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Staging is healthy: HTTP $STATUS"
