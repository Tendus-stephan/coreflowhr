[functions]
# Disable JWT verification for stripe-webhook to allow Stripe to call it
[functions.stripe-webhook]
verify_jwt = false

# Disable JWT verification for OAuth callbacks (called by OAuth providers)
[functions.connect-google-callback]
verify_jwt = false

[functions.connect-teams-callback]
verify_jwt = false

# Dropbox Sign calls this when a document is fully signed (no JWT)
[functions.dropbox-sign-webhook]
verify_jwt = false

# Resend inbound webhook (email.received) calls this without JWT
[functions.receive-candidate-email]
verify_jwt = false
