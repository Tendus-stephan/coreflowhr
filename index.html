            theme: {

    <style>
        html {
            font-size: 15px;
        }
        body {
            background-color: #f9fafb; /* gray-50 — very slight off-white like Attio */
            color: #111827;
            font-family: 'Inter', sans-serif;
            font-feature-settings: 'cv11', 'ss01'; /* Inter optical features */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Headings use optical sizing for crisper rendering at large sizes */
        h1, h2, h3 {
            font-optical-sizing: auto;
            letter-spacing: -0.02em;
        }

        /* Overline labels — small caps tracking */
        .label-overline {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f3f4f6; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af; 
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* CoreLoader Animations */
        @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0%); }
            100% { transform: translateX(100%); }
        }
        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }
        .fill-mode-forwards {
            animation-fill-mode: forwards;
        }
    </style>
